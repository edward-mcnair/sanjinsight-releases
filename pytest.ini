[pytest]
# Use importlib import mode so pytest resolves modules from the project root
# rather than picking up stale copies from any git worktrees on sys.path.
addopts = --import-mode=importlib
testpaths = tests
# Prevent pytest recursing into build artefacts, worktrees, or other hidden dirs.
norecursedirs = .* .claude node_modules __pycache__ dist build
