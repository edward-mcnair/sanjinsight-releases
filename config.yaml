# Microsanj System Configuration
# Edit this file to match your hardware setup - no code changes needed.

hardware:

  # ── Imaging system type ──────────────────────────────────────────────────────
  # Controls which imaging modes are available in the UI.
  #   hybrid   — nose-head with both TR and IR objectives (user rotates to switch)
  #   tr_only  — thermoreflectance objective only
  #   ir_only  — infrared USB lens only
  imaging_system: "hybrid"

  tec_meerstetter:
    enabled: true
    driver: "simulated"   # simulated | meerstetter
    port: "COM3"          # Change to match your system (e.g. COM4, /dev/ttyUSB0)
    # TEC-1089 production defaults (Meerstetter SN 9376, HW 2.1)
    baudrate: 57600
    address: 2            # Device address set on the unit (default: 2)
    timeout: 10.0
    pid_kp: 35.0          # Proportional gain
    pid_ti: 5.0           # Integral time constant (s)
    pid_td: 0.5           # Derivative time constant (s)
    max_current_a: 9.25   # Maximum TEC output current (A)
    max_delta_t: 68.0     # Maximum ΔT across TEC module (°C)
    control_cycle_hz: 10.0        # PID control loop rate (Hz)
    switching_freq_khz: 300.0     # H-bridge switching frequency (kHz)
    stability_tolerance_c: 1.0    # °C band for "temperature stable" flag
    stability_duration_s: 10.0    # Seconds within tolerance before stable
    ntc_r25_ohm: 10000            # NTC thermistor resistance at 25°C (Ω)
    ntc_source_current_ua: 50.0   # NTC excitation source current (µA)
    initial_temp: 25.0    # simulated driver starting temperature
    # ── Safety limits ──────────────────────────────────────────────
    # TEC output is immediately disabled if temperature exceeds these limits.
    # A warning is shown when temperature is within temp_warning_margin of a limit.
    temp_min: -20.0       # °C  — hard lower limit
    temp_max:  85.0       # °C  — hard upper limit
    temp_warning_margin: 5.0  # °C  — warning zone inside each limit

  tec_atec:
    enabled: true
    driver: "simulated"   # simulated | atec
    port: "COM4"          # Change to match your system
    baudrate: 9600
    address: 1
    timeout: 1.0
    initial_temp: 25.0
    # ── Safety limits ──────────────────────────────────────────────
    temp_min: -20.0
    temp_max:  85.0
    temp_warning_margin: 5.0

  # ── Camera type ────────────────────────────────────────────────────────────
  # camera_type identifies whether this camera captures thermoreflectance (tr)
  # or infrared emission (ir).  The software cannot infer this from the model
  # name alone — set it here and in Device Manager so the UI shows the
  # correct modality label and scan options.
  #   tr  — thermoreflectance camera (Basler, NI IMAQdx, DirectShow, …)
  #   ir  — infrared / uncooled bolometer camera (FLIR Boson, FLIR-based OEM camera)

  camera:
    enabled: true
    camera_type: "tr"          # "tr" | "ir"  — set to match your hardware
    driver: "ni_imaqdx"    # ni_imaqdx | pypylon | directshow | flir | simulated
    # --- NI IMAQdx settings (driver: ni_imaqdx) ---
    # camera_name: Open NI MAX → Devices and Interfaces → NI-IMAQdx Devices
    #              The name displayed there (e.g. "cam0", "cam4") goes here.
    #              Names are assigned by enumeration order and can change if
    #              cameras are reconnected — verify after any USB change.
    #              Typical names by camera model:
    #                Basler acA1920-155um        → "cam4" (or "cam0" if only camera)
    #                Basler a2A1280-125umSWIR    → "cam0" (check NI MAX after connect)
    #                Allied Vision Goldeye G-032 → "cam3" or the name shown in NI MAX
    #                Photonfocus MV4-D1280U      → varies; check NI MAX after connect
    camera_name: "cam4"
    width: 1920
    height: 1200
    model: "Basler acA1920-155um"
    # --- pypylon settings (driver: pypylon) ---
    # serial: ""            # Leave blank for first found Basler camera
    #                       # Find serial: printed on camera label, or run
    #                       #   python -c "from pypylon import pylon; [print(d.GetSerialNumber()) for d in pylon.TlFactory.GetInstance().EnumerateDevices()]"
    # --- DirectShow settings (driver: directshow) ---
    # device_index: 0       # Run find_camera.py to identify index
    # fourcc: "Y16 "        # Pixel format (Y16 for 16-bit mono)
    # --- FLIR Boson settings (driver: boson) ---
    # Standalone FLIR Boson 320 or 640 connected via USB.
    # The bundled Boson Python SDK handles control; OpenCV handles video.
    # No separate Basler or FLIR SDK installation required.
    # driver: "boson"
    # serial_port: "/dev/cu.usbmodemXXXX"  # macOS: use `ls /dev/cu.usb*` to find
    #                                        # Windows: "COM3", "COM4", etc.
    #                                        # Leave BLANK for video-only mode
    #                                        # (camera works without serial_port;
    #                                        #  SDK commands like FFC unavailable)
    # video_index: 0        # OpenCV VideoCapture index for the Boson UVC stream.
    #                       # 0 = first camera.  If a built-in webcam is present,
    #                       # try 1 or 2 until the thermal image appears.
    # width: 320            # 320 for Boson 320, 640 for Boson 640
    # height: 256           # 256 for Boson 320, 512 for Boson 640
    # fps: 60
    # camera_type: "ir"     # Always "ir" for thermal cameras
    # --- FLIR / flirpy settings (driver: flir) ---
    # For the Microsanj Infrared Camera v1a (FLIR-based uncooled microbolometer,
    # 4.9 mm fixed FL, OEMCameras.com PCB).  Uses bundled flirpy — no extra install.
    # serial: ""            # Leave blank for first found FLIR camera
    # ir_format: "Mono14"   # Pixel format: Mono14 (default) | Mono16 | Mono8
    #                       # Mono14 preserves the full 14-bit dynamic range of
    #                       # uncooled microbolometer sensors.
    # ffc_mode: "auto"      # Flat Field Correction: auto | manual | external
    #                       # "auto" → camera runs NUC automatically (recommended)
    #                       # "manual" → call do_ffc() at the start of each run
    # --- Common settings ---
    exposure_us: 5000
    gain: 0.0
    trigger_mode: "Off"

  # ── Multi-camera systems (optional — uncomment and replace 'camera:' above) ─
  # Use 'cameras:' when two physical cameras are present (e.g. hybrid TR + IR).
  # The software shows all entries in a dropdown; selecting one switches the
  # active modality and live feed.  Each entry accepts the same driver settings
  # as the single-camera 'camera:' section above.
  #
  # cameras:
  #   - label: "Basler acA1920-155um"
  #     camera_type: "tr"
  #     driver: "ni_imaqdx"
  #     camera_name: "cam4"
  #     width: 1920
  #     height: 1200
  #     exposure_us: 5000
  #     gain: 0.0
  #     trigger_mode: "Off"
  #   - label: "Microsanj IR Camera"
  #     camera_type: "ir"
  #     driver: "flir"
  #     exposure_us: 8333
  #     gain: 0.0

  fpga:
    enabled: true
    driver: "simulated"   # simulated | ni9637
    # bitfile: path to the compiled LabVIEW FPGA bitfile (.lvbitx).
    #   After installation: "C:/Program Files/Microsanj/SanjINSIGHT/firmware/ez500_fpga.lvbitx"
    #   During development: use the absolute path to your local copy.
    bitfile: "firmware/ez500_fpga.lvbitx"
    # resource: Found in NI MAX → Remote Systems → right-click target → Properties
    #           Format: "RIO0" (local chassis) or "rio://169.254.x.x/RIO0" (Ethernet)
    resource: "rio://169.254.252.165/RIO0"
    # reset_on_open: true  (default, recommended) — FPGA resets on session open
    #               and on app exit/crash, stopping stimulus output automatically.
    #               Set to false ONLY if you need the FPGA to continue running
    #               across software restarts (e.g. during extended soak tests).
    reset_on_open: true
    # ── Stimulus timing defaults ──────────────────────────────────────
    initial_period_us: 1000.0     # Stimulus period in microseconds
    initial_duty: 0.5             # Duty cycle (0.0–1.0)

  autofocus:
    enabled: true
    driver: "simulated"     # simulated | sweep | hill_climb
    strategy: "sweep"       # used when driver is "sweep" or "hill_climb"
    metric: "laplacian"     # laplacian | tenengrad | normalized | fft | brenner
    z_start: -500.0         # μm relative to current Z (coarse sweep start)
    z_end:    500.0         # μm relative to current Z (coarse sweep end)
    coarse_step:  50.0      # μm — first pass step size
    fine_step:     5.0      # μm — second pass step size
    fine_range:  100.0      # μm — window around coarse peak for fine pass
    n_avg:         2        # frames to average per Z position
    settle_ms:    50        # ms to wait after each Z move
    move_to_best: true      # move to best Z when done
    # --- Simulated driver settings ---
    true_best_z:  1250.0    # μm — simulated best-focus Z position
    focus_width:   200.0    # μm — simulated depth of field (Gaussian σ)
    noise_level:    0.02    # fractional noise on simulated score

  stage:
    enabled: true
    driver: "simulated"     # simulated | thorlabs | newport_npc3 | serial_stage
    speed_xy: 1000.0        # μm/s lateral speed
    speed_z:  100.0         # μm/s focus speed
    noise:    0.05          # simulated position noise (μm)
    # --- Thorlabs settings ---
    # serial_x / serial_y / serial_z: 8-digit serial number printed on the
    #   controller label (e.g. "27xxxxxx" for BBD/TDC/KDC, "45xxxxxx" for BSC).
    #   Also visible in Thorlabs Kinesis → Simulation Manager → Serial Number,
    #   or in Device Manager → Ports → Thorlabs APT Controller (COMx).
    # serial_x: "27000001"
    # serial_y: "27000002"
    # serial_z: "27000003"
    # --- Serial stage settings ---
    # port:    "COM5"
    # baudrate: 9600
    # dialect: "prior"      # prior | ludl | asi | marzhauser

  bias:
    enabled: true
    driver: "simulated"     # simulated | keithley | visa_generic
    mode: "voltage"          # voltage | current
    level: 0.0               # initial output level (V or A)
    compliance: 0.1          # current limit (A) when voltage mode, or V limit when current mode
    noise: 0.001             # simulated readback noise
    # --- Keithley settings ---
    # address: VISA resource string — find in NI MAX → Instruments or
    #          run: python -c "import pyvisa; print(pyvisa.ResourceManager().list_resources())"
    #   GPIB:    "GPIB0::24::INSTR"   (24 = GPIB address on rear panel)
    #   USB:     "USB0::0x05E6::0x2400::xxxxxxx::INSTR"  (copy from NI MAX)
    #   Ethernet:"TCPIP0::192.168.1.5::inst0::INSTR"
    # address: "GPIB0::24::INSTR"
    # model: "2400"         # 2400 | 2450 | 2601 | 2602 | 2611 | 2612 | 2635 | 2636
    # --- Generic VISA settings ---
    # address: "TCPIP::192.168.1.10::INSTR"
    # channel: 1

  monochromator:
    enabled: false          # Set true when a Newport Cornerstone (or compatible) is connected
    driver: "simulated"     # simulated | cornerstone
    # --- Newport Cornerstone 74000 / 260 / 74004 settings ---
    # port:       "COM3"    # Windows: COMx, macOS/Linux: /dev/tty.usbserial-xxxx
    # baudrate:   9600      # Factory default; check rear panel DIP switches
    # timeout_s:  5.0       # Serial read timeout (seconds)
    # --- Sweep defaults ---
    default_wavelength_nm:   532.0     # Initial wavelength after connect (nm)
    step_size_nm:             5.0      # Default sweep step size (nm)
    dwell_ms:              1000.0      # Default dwell per wavelength step (ms)

logging:
  level: "INFO"           # DEBUG, INFO, WARNING, ERROR
  log_to_file: true
  log_file: "logs/microsanj.log"
