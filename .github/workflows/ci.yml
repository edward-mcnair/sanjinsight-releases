# .github/workflows/ci.yml
#
# Runs on every push and pull request.
# Fast syntax + import check — catches broken code before it reaches the installer build.

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  syntax-check:
    name: Syntax & import check
    runs-on: ubuntu-latest      # fast and free
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install only what's needed for syntax checks — not hardware packages
          pip install PyQt5 numpy PyYAML matplotlib h5py scipy

      - name: Compile check all Python files
        run: |
          echo "Checking syntax of all .py files..."
          find . -name "*.py" \
            ! -path "./.git/*" \
            ! -path "./dist/*" \
            ! -path "./build/*" \
            -print0 | xargs -0 python3 -m py_compile
          echo "✓ All files compile clean"

      - name: Check version.py is valid
        run: |
          python3 -c "
          from version import __version__, VERSION_TUPLE, APP_NAME, APP_VENDOR
          from version import parse_version, is_newer, version_string
          print(f'✓ Version: {version_string()}')
          print(f'✓ Tuple:   {VERSION_TUPLE}')
          assert len(VERSION_TUPLE) == 3, 'VERSION_TUPLE must have 3 elements'
          base = '.'.join(str(x) for x in VERSION_TUPLE)
          assert __version__ == base or __version__.startswith(base), \
              '__version__ and VERSION_TUPLE are out of sync'
          print('✓ version.py is consistent')
          "

      - name: Check CHANGELOG has entry for current version
        run: |
          python3 -c "
          from version import __version__
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          assert f'[{__version__}]' in content, \
              f'CHANGELOG.md has no entry for v{__version__} — add one before releasing'
          print(f'✓ CHANGELOG.md has entry for v{__version__}')
          "

  # ── Job 2: Test suite ────────────────────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies (headless Qt)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 \
            libxcb-xinerama0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Only packages needed for the pure-Python / AI test suite.
          # Hardware-dependent packages (nifpga, ni_imaqdx) are unavailable on
          # CI runners; tests that require them skip themselves automatically.
          pip install PyQt5 numpy pytest PyYAML matplotlib h5py scipy

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -q --tb=short
